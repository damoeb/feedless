<ion-header style="box-shadow: none">
  <ion-toolbar>
    <ion-title>Gratis Email Abo erstellen</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closeModal()">
        <app-icon name="close-outline"></app-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <p class="ion-padding">
    Verpasse keine Veranstaltung mehr in deiner Umgebung
    <strong>{{ location.displayName }}</strong
    >! 100% kostenlos und sicher!
  </p>
  <ion-item lines="none">
    <ion-input
      [formControl]="formGroup.controls.name"
      label="Dein Name"
      labelPlacement="start"
      errorText="Wie sollen wir dich ansprechen?"
      placeholder="Hans Muster"
    >
    </ion-input>
  </ion-item>
  <ion-item lines="none">
    <ion-input
      [formControl]="formGroup.controls.email"
      label="Deine Email"
      labelPlacement="start"
      errorText="Wohin sollen wir die Email senden?"
      placeholder="mail@example.com"
    >
    </ion-input>
  </ion-item>

  <div>
    <ion-radio-group [formControl]="formGroup.controls.frequency" class="ion-margin-top">
      <ion-item style="--background: transparent; margin-top: 30px">
        <ion-label color="medium">
          <h2>
            Wie oft willst du deine Veranstaltungsvorschau erhalten?
          </h2>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <ion-radio labelPlacement="end" justify="start" [value]="reportFrequencyWeek"
          >Wöchentlich
          </ion-radio>
        </ion-label>
        <ion-label>
          <ion-radio labelPlacement="end" justify="start" [value]="reportFrequencyMonth">Monatlich
          </ion-radio>
          <!--          <ion-note> Static tracking based on one URL</ion-note>-->
        </ion-label>
      </ion-item>
    </ion-radio-group>
  </div>

  <ion-list class="ion-padding-top">
    <ion-item
      [color]="
        formGroup.controls.acceptedTerms.invalid && !formGroup.controls.acceptedTerms.untouched
          ? 'danger'
          : undefined
      "
    >
      <ion-checkbox labelPlacement="end" [formControl]="formGroup.controls.acceptedTerms">
        <ion-label class="ion-text-wrap">
          Ich stimme den
          <a href="/agb" target="_blank" (click)="$event.stopPropagation()"
          >Datenschutzrichtlinien und den AGBs</a
          >
          zu
        </ion-label>
      </ion-checkbox>
    </ion-item>
    <div style="display: flex">
      <ion-button style="flex: 1" expand="block" (click)="createMailSubscription()">
        Jetzt Abonnieren
        <app-icon name="send-outline" slot="end"></app-icon>
      </ion-button>
    </div>
  </ion-list>

</ion-content>
